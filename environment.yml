name: phenotype-clustering
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  
  # Data Processing & Analysis
  - pandas>=1.5.0
  - numpy>=1.23.0
  
  # Visualization
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  - plotly>=5.10.0
  - matplotlib-venn>=0.11.6
  
  # Machine Learning & Clustering
  - scikit-learn>=1.0.0,<1.3.0
  - scipy>=1.9.0  # For hierarchical clustering, distance metrics
  - hdbscan>=0.8.29  # For density-based clustering
  
  # Text/Code Similarity & String Matching
  - python-levenshtein>=0.20.0  # For string similarity
  - fuzzywuzzy>=0.18.0  # String fuzzy matching
  
  # Jupyter & Interactive Development
  - jupyter>=1.0.0
  - jupyterlab>=3.5.0
  - ipython>=8.0.0
  
  # Graph & Network Visualization (optional, for similarity networks)
  - networkx>=2.8
  
  # Statistical Testing
  - statsmodels>=0.13.0
  
  # Utilities
  - tqdm>=4.64.0  # Progress bars
  - python-dotenv>=0.20.0  # Environment variable management
  
  # Code Quality & Development
  - pip>=22.0
  - pytest>=7.0.0
  - black>=22.0.0
  - flake8>=5.0.0

pip:
  - openpyxl>=3.1.0
  - et-xmlfile>=2.0.0
  - xlrd
  - ydata-profiling  # Modern replacement for pandas-profiling
